global:
  resolve_timeout: 5m

route:
  receiver: 'telegram-default'
  group_by: ['alertname', 'instance']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    # Critical → repeat nhanh hơn
    - matchers:
        - severity = "critical"
      receiver: 'telegram-critical'
      group_wait: 10s
      repeat_interval: 1h

# Critical đè warning cùng instance (tránh spam)
inhibit_rules:
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal: ['alertname', 'instance']

receivers:
  - name: 'telegram-default'
    telegram_configs:
      - bot_token: 'PASTE_YOUR_BOT_TOKEN_HERE'    # ← THAY VÀO ĐÂY
        chat_id: -1001234567890                    # ← THAY VÀO ĐÂY (số nguyên, không phải chuỗi)
        parse_mode: 'HTML'
        send_resolved: true
        message: |
          {{ range .Alerts }}
          {{ if eq .Status "firing" }}🟡 <b>WARNING</b>{{ else }}✅ <b>RESOLVED</b>{{ end }}
          <b>Alert:</b> {{ .Labels.alertname }}
          <b>Instance:</b> {{ .Labels.instance }}
          <b>Summary:</b> {{ .Annotations.summary }}
          <b>Description:</b> {{ .Annotations.description }}
          <b>Time:</b> {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          {{ end }}

  - name: 'telegram-critical'
    telegram_configs:
      - bot_token: 'PASTE_YOUR_BOT_TOKEN_HERE'    # ← THAY VÀO ĐÂY (giống trên)
        chat_id: -1001234567890                    # ← THAY VÀO ĐÂY (giống trên)
        parse_mode: 'HTML'
        send_resolved: true
        message: |
          {{ range .Alerts }}
          {{ if eq .Status "firing" }}🔴 <b>CRITICAL</b>{{ else }}✅ <b>RESOLVED</b>{{ end }}
          <b>Alert:</b> {{ .Labels.alertname }}
          <b>Instance:</b> {{ .Labels.instance }}
          <b>Summary:</b> {{ .Annotations.summary }}
          <b>Description:</b> {{ .Annotations.description }}
          <b>Time:</b> {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          {{ end }}

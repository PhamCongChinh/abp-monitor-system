global:
  resolve_timeout: 5m

route:
  receiver: 'telegram-default'
  group_by: ['alertname', 'instance']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    - matchers:
        - severity = "critical"
      receiver: 'telegram-critical'
      group_wait: 10s
      repeat_interval: 1h

# Khi critical firing trên instance → chặn toàn bộ warning cùng instance (tránh spam)
inhibit_rules:
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal: ['instance']

x-telegram-common: &telegram-common
  bot_token: '${TELEGRAM_BOT_TOKEN}'
  chat_id: ${TELEGRAM_CHAT_ID}
  parse_mode: 'HTML'
  send_resolved: true

receivers:
  - name: 'telegram-default'
    telegram_configs:
      - <<: *telegram-common
        message: |
          {{ range .Alerts }}
          {{ if eq .Status "firing" }}🟡 <b>WARNING</b>{{ else }}✅ <b>RESOLVED</b>{{ end }}
          <b>Alert:</b> {{ .Labels.alertname }}
          <b>Instance:</b> {{ .Labels.instance }}
          <b>Summary:</b> {{ .Annotations.summary }}
          <b>Description:</b> {{ .Annotations.description }}
          <b>Time:</b> {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          {{ end }}

  - name: 'telegram-critical'
    telegram_configs:
      - <<: *telegram-common
        message: |
          {{ range .Alerts }}
          {{ if eq .Status "firing" }}🔴 <b>CRITICAL</b>{{ else }}✅ <b>RESOLVED</b>{{ end }}
          <b>Alert:</b> {{ .Labels.alertname }}
          <b>Instance:</b> {{ .Labels.instance }}
          <b>Summary:</b> {{ .Annotations.summary }}
          <b>Description:</b> {{ .Annotations.description }}
          <b>Time:</b> {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          {{ end }}

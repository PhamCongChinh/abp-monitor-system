groups:
  - name: container_alerts
    rules:
      - alert: MongoContainerDown
        expr: absent(container_last_seen{name="mongo004"}) or time() - container_last_seen{name="mongo004"} > 60
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Container MongoDB đã dừng"
          description: "Container 'mongo004' trên 103.97.125.64 không phản hồi hơn 2 phút"

groups:
  - name: mongodb
    rules:
      - alert: MongoDBDown
        expr: mongodb_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "🔴 MongoDB không phản hồi"
          description: "MongoDB không kết nối được hơn 1 phút — kiểm tra container và disk"

      - alert: MongoDBTooManyConnections
        expr: mongodb_connections{state="current"} > 500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "⚠️ MongoDB quá nhiều kết nối ({{ $value }})"
          description: "Số kết nối vượt 500 liên tục 5 phút — kiểm tra connection pool phía client"

      - alert: MongoDBHighMemory
        expr: mongodb_memory{type="resident"} > 2048
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "⚠️ MongoDB RAM cao ({{ $value }}MB)"
          description: "Bộ nhớ resident vượt 2GB liên tục 5 phút — kiểm tra query có COLLSCAN không"

      - alert: MongoDBReplicationLagHigh
        expr: mongodb_mongod_replset_member_optime_date{state="SECONDARY"} - on() mongodb_mongod_replset_member_optime_date{state="PRIMARY"} > 30
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "⚠️ MongoDB replication lag cao ({{ $value }}s)"
          description: "Độ trễ replication vượt 30 giây — secondary đang bị tụt hậu so với primary"

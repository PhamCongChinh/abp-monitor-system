groups:

  # ─── CRITICAL — gọi ngay ───────────────────────────────────────────────────
  - name: pipeline_critical
    rules:

      - alert: PlatformNoData2h
        expr: increase(gateway_posts_by_platform_total{platform=~"web|tiktok|facebook|youtube"}[2h]) == 0
        for: 5m
        labels:
          severity: critical
          platform: "{{ $labels.platform }}"
        annotations:
          summary: "{{ $labels.platform }} không có data 2h"
          description: "Crawler {{ $labels.platform }} bị block, API 429/403, hoặc pipeline tắc trước Kafka"

      - alert: OOMKillDetected
        expr: increase(node_vmstat_oom_kill[5m]) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "OOM Kill trên {{ $labels.instance }}"
          description: "Kernel đã kill process vì hết RAM — nghi phạm: MongoDB hoặc headless browser. Kiểm tra container_memory_failcnt"

      - alert: DiskCritical
        expr: |
          (node_filesystem_avail_bytes{fstype!~"tmpfs|fuse.lxcfs|squashfs"}
          / node_filesystem_size_bytes{fstype!~"tmpfs|fuse.lxcfs|squashfs"}) * 100 < 5
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Disk > 95% — MongoDB sẽ dừng ghi (còn {{ $value | humanize }}%)"
          description: "Mount {{ $labels.mountpoint }} trên {{ $labels.instance }} sắp đầy hoàn toàn"

      - alert: KafkaTotalLagExplosion
        expr: sum(kafka_consumergroup_lag) > 2000
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Kafka lag {{ $value | humanize }} messages — pipeline gần vỡ"
          description: "Consumer xử lý quá chậm hoặc đã chết — data đang tồn đọng cực lớn"

  # ─── WARNING — xem trong giờ ───────────────────────────────────────────────
  - name: pipeline_warning
    rules:

      - alert: DiskWarning
        expr: |
          (node_filesystem_avail_bytes{fstype!~"tmpfs|fuse.lxcfs|squashfs"}
          / node_filesystem_size_bytes{fstype!~"tmpfs|fuse.lxcfs|squashfs"}) * 100 < 10
          and
          (node_filesystem_avail_bytes{fstype!~"tmpfs|fuse.lxcfs|squashfs"}
          / node_filesystem_size_bytes{fstype!~"tmpfs|fuse.lxcfs|squashfs"}) * 100 >= 5
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Disk > 90% — cần dọn dẹp sớm (còn {{ $value | humanize }}%)"
          description: "Mount {{ $labels.mountpoint }} trên {{ $labels.instance }} đang đầy dần"

      - alert: KafkaHighLag
        expr: sum by (consumergroup, topic) (kafka_consumergroup_lag) > 500 and sum by (consumergroup, topic) (kafka_consumergroup_lag) <= 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Kafka lag cao: {{ $value | humanize }} messages"
          description: "Topic: <b>{{ $labels.topic }}</b> | Group: <b>{{ $labels.consumergroup }}</b> — tồn đọng lớn, nếu vượt 1,000 sẽ chuyển critical"

      - alert: KafkaCriticalLag
        expr: sum by (consumergroup, topic) (kafka_consumergroup_lag) > 1000
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Kafka lag khẩn cấp: {{ $value | humanize }} messages"
          description: "Topic: <b>{{ $labels.topic }}</b> | Group: <b>{{ $labels.consumergroup }}</b> — tồn đọng nghiêm trọng, cần xử lý ngay"

